name: sirinx-v15

services:
  sirinx-public:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.sirinx
    image: sirinx-public:local
    container_name: sirinx-public
    environment:
      NODE_ENV: production
      PORT: "3000"
      OPS_AGENT_MONITOR_ENABLED: "true"
      # Current repository baseline still uses Drizzle MySQL/TiDB.
      # PostgreSQL is the v15 target and must be migrated before live cutover.
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: redis://sirinx-redis:6379/0
    ports:
      - "3000:3000"
    depends_on:
      sirinx-redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - sirinx_public
      - sirinx_private

  # Target v15 durable database with pgvector. Keep disabled until schema migration from MySQL/TiDB is reviewed.
  sirinx-postgres:
    image: pgvector/pgvector:pg16
    container_name: sirinx-postgres
    profiles: ["postgres-target", "automation", "ops-dashboard"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sirinx}
      POSTGRES_USER: ${POSTGRES_USER:-sirinx}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - sirinx-postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    secrets:
      - postgres_password
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sirinx} -d ${POSTGRES_DB:-sirinx}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - sirinx_private

  sirinx-redis:
    image: redis:7-alpine
    container_name: sirinx-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - sirinx-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - sirinx_private

  n8n-main:
    image: n8nio/n8n:1.116.2
    container_name: sirinx-n8n-main
    profiles: ["automation"]
    environment:
      N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_encryption_key
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: sirinx-redis
      QUEUE_BULL_REDIS_PORT: "6379"
      N8N_RUNNERS_ENABLED: "true"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: sirinx-postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-sirinx}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-sirinx}
      DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/postgres_password
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-https://ops.sirinx.co/}
    volumes:
      - sirinx-n8n-data:/home/node/.n8n
    secrets:
      - n8n_encryption_key
    depends_on:
      sirinx-redis:
        condition: service_healthy
      sirinx-postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sirinx_private

  n8n-worker:
    image: n8nio/n8n:1.116.2
    container_name: sirinx-n8n-worker
    profiles: ["automation"]
    command: ["worker"]
    environment:
      N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_encryption_key
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: sirinx-redis
      QUEUE_BULL_REDIS_PORT: "6379"
      N8N_RUNNERS_ENABLED: "true"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: sirinx-postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-sirinx}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-sirinx}
      DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - sirinx-n8n-data:/home/node/.n8n
    secrets:
      - n8n_encryption_key
    depends_on:
      sirinx-redis:
        condition: service_healthy
      sirinx-postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sirinx_private

  n8n-runner:
    image: n8nio/runners:1.116.2
    container_name: sirinx-n8n-runner
    profiles: ["automation"]
    environment:
      N8N_RUNNERS_AUTH_TOKEN_FILE: /run/secrets/n8n_runner_token
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n-main:5679
    secrets:
      - n8n_runner_token
    depends_on:
      - n8n-main
    restart: unless-stopped
    networks:
      - sirinx_private

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  n8n_encryption_key:
    file: ./secrets/n8n_encryption_key.txt
  n8n_runner_token:
    file: ./secrets/n8n_runner_token.txt

volumes:
  sirinx-postgres-data:
  sirinx-redis-data:
  sirinx-n8n-data:

networks:
  sirinx_public:
  sirinx_private:
    internal: true

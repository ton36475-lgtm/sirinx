services:
  sirinx-api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.sirinx-api
    image: sirinx/api:local
    restart: unless-stopped
    env_file:
      - ./api.env.example
    environment:
      NODE_ENV: production
      PORT: "3000"
      SIRINX_TRUST_PROXY: loopback
      SIRINX_API_PUBLIC_ORIGIN: https://api.sirinx.co
      SIRINX_PUBLIC_BASE_URL: https://www.sirinx.co
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - sirinx-api-runtime:/app/runtime-output
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  sirinx-api-runtime:

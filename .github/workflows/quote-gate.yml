name: Quote Gate

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/quote-gate.yml"
      - "client/**"
      - "server/**"
      - "shared/**"
      - "drizzle/**"
      - "scripts/quotation-*.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
  push:
    branches:
      - "codex/**"
    paths:
      - ".github/workflows/quote-gate.yml"
      - "client/**"
      - "server/**"
      - "shared/**"
      - "drizzle/**"
      - "scripts/quotation-*.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"

permissions:
  contents: read

jobs:
  quote-local-gate:
    name: Quote local gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run local quotation gate
        run: pnpm quote:gate:local
